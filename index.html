<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>양구, 발걸음 가볍개 - 양구군 반려동물 동반 지도 판별기</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="반려동물과 함께 떠나는 양구군 여행! 펜션, 캠핑장, 카페, 식당, 관광지까지 반려견과 함께할 수 있는 양구의 모든 장소를 지도로 편리하게 확인하고 30초 만에 판별해 보세요.">
  <meta name="keywords" content="양구군, 반려동물, 애견동반, 양구여행, 댕댕맵, 양구, 발걸음 가볍개, 반려견동반, 한반도섬, 양구수목원">
  <meta property="og:title" content="양구, 발걸음 가볍개 - 양구군 반려동물 동반 지도 판별기">
  <meta property="og:description" content="반려견과 함께하는 양구군 관광 지도 가이드. 숙소, 관광지, 식당/카페, 산책로 정보 총망라!">
  <meta property="og:type" content="website">
  
  <!-- Favicon (Emoji as Icon) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐾</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- App Custom CSS -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <!-- App Header -->
  <header class="app-header">
    <div class="header-container">
      <div class="logo-area" id="btn-logo">
        <span class="logo-emoji">🐾</span>
        <h1 class="logo-text">양구, <span>발걸음 가볍개</span></h1>
      </div>
      <nav class="header-nav" aria-label="메인 메뉴">
        <span class="nav-subtitle">양구군 애견동반 판별 지도</span>
      </nav>
    </div>
  </header>

  <!-- Main Container -->
  <div class="app-container">
    
    <!-- Sidebar: 30% Width -->
    <aside class="sidebar" id="sidebar">
      
      <!-- Search & Filters Container -->
      <div class="search-filter-section">
        
        <!-- Text Search -->
        <div class="search-bar">
          <i data-lucide="search" class="search-icon" aria-hidden="true"></i>
          <input type="text" id="search-input" placeholder="장소명, 주소, 꿀팁 검색 (예: 한반도섬, 캠핑)..." autocomplete="off" aria-label="장소 검색">
          <button id="search-clear-btn" class="search-clear-btn hidden" aria-label="검색어 지우기">
            <i data-lucide="x"></i>
          </button>
        </div>

        <!-- Category Buttons -->
        <div class="category-filters" role="tablist" aria-label="장소 카테고리 필터">
          <button class="category-btn active" data-category="전체" role="tab" aria-selected="true">
            <i data-lucide="grid" aria-hidden="true"></i> 전체
          </button>
          <button class="category-btn" data-category="숙박" role="tab" aria-selected="false">
            <i data-lucide="home" aria-hidden="true"></i> 숙소
          </button>
          <button class="category-btn" data-category="카페·식당" role="tab" aria-selected="false">
            <i data-lucide="coffee" aria-hidden="true"></i> 식당/카페
          </button>
          <button class="category-btn" data-category="관광지" role="tab" aria-selected="false">
            <i data-lucide="palmtree" aria-hidden="true"></i> 관광지
          </button>
          <button class="category-btn" data-category="산책" role="tab" aria-selected="false">
            <i data-lucide="navigation" aria-hidden="true"></i> 산책로
          </button>
        </div>

        <!-- Pet Conditions Filter -->
        <div class="pet-conditions-filter">
          <span class="filter-title">반려견 동반 필수 필터:</span>
          <div class="condition-chips">
            <button class="condition-chip" data-condition="소형견">소형견 가능</button>
            <button class="condition-chip" data-condition="중형견">중형견 가능</button>
            <button class="condition-chip" data-condition="대형견">대형견 가능</button>
          </div>
        </div>

        <!-- Priority Sort Filter (기획서 우선순위 로직 결합) -->
        <div class="priority-sort-filter">
          <label for="priority-select" class="filter-title">결과 정렬 기준:</label>
          <select id="priority-select" class="sort-select" aria-label="정렬 조건을 선택하세요">
            <option value="trust">신뢰도 높은 순 (A등급 우선)</option>
            <option value="official">공식 정보가 있는 곳 우선</option>
            <option value="map">지도가 제공되는 곳 우선</option>
            <option value="phone">전화 연결 가능한 곳 우선</option>
          </select>
        </div>

      </div>

      <!-- Places List -->
      <div class="list-section">
        <div class="list-header">
          <span class="count-text">총 <strong id="place-count">0</strong>개의 추천 장소</span>
          <button class="reset-filter-btn" id="btn-reset-filters">필터 초기화</button>
        </div>
        
        <!-- Places List Target -->
        <div class="places-list" id="places-list" role="region" aria-live="polite">
          <!-- JS에서 동적으로 데이터 카드 렌더링 -->
        </div>
      </div>
    </aside>

    <!-- Map Area: 70% Width -->
    <main class="map-area">
      <!-- Leaflet Map Div -->
      <div id="map" aria-label="양구군 애견동반 인터랙티브 지도"></div>
      
      <!-- Mobile Floating View Toggle Button -->
      <button class="mobile-toggle-view-btn" id="btn-mobile-toggle" aria-label="목록 보기로 전환">
        <i data-lucide="list"></i> <span>목록 보기</span>
      </button>
    </main>

  </div>

  <!-- Detail Information Panel (Slide-in) -->
  <div class="detail-panel" id="detail-panel" role="dialog" aria-modal="true" aria-hidden="true">
    <button class="detail-close-btn" id="btn-detail-close" aria-label="상세 패널 닫기">
      <i data-lucide="x"></i>
    </button>
    
    <div class="detail-content" id="detail-content">
      <!-- JS에서 카드를 클릭했을 때 해당 장소의 상세 내용, 4대 포털 검색링크, 질문 복사 템플릿 주입 -->
    </div>
  </div>
  
  <!-- Backdrop for Detail Panel on Mobile -->
  <div class="panel-backdrop" id="panel-backdrop"></div>

  <!-- Leaflet Map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Lucide Icons Library (For UI Icons) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- App Custom Logic -->
  <script src="./js/app.js"></script>
</body>
</html>
